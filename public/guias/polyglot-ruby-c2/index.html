<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Ruby a fondo · Polyglot</title>
  <meta name="description" content="Guía visual de los internals de Ruby 4.0: pipeline de ejecución, YARV, JIT, GVL, Ractors, GC, object shapes y modelo de objetos. Primera entrega de la colección Polyglot de notdefined.">

  <!-- Favicon SVG inline con las tintas del tema (focal-frame + punto rubí) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38 38'%3E%3Cpath d='M3 11V3h8M35 11V3h-8M3 27v8h8M35 27v8h-8' fill='none' stroke='%23E24D68' stroke-width='2'/%3E%3Ccircle cx='19' cy='19' r='3.4' fill='%23E24D68'/%3E%3C/svg%3E">

  <!-- Tema antes del primer paint: lee guia-tema (light/dark/system, default dark) -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem("guia-tema") || "dark";
        var dark = pref === "dark" ||
          (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="page"></div>

  <!-- Motor: núcleo primero, piezas compartidas después -->
  <script src="./js/core.js"></script>
  <script src="./js/components.js"></script>

  <!-- Contenido (el guión): agregar o corregir temas se hace solo aquí -->
  <script src="./data/catalog.js"></script>
  <script src="./data/pipeline.js"></script>
  <script src="./data/yarv.js"></script>
  <script src="./data/jit.js"></script>
  <script src="./data/gvl.js"></script>
  <script src="./data/ractors.js"></script>
  <script src="./data/fibers.js"></script>
  <script src="./data/gc.js"></script>
  <script src="./data/shapes.js"></script>
  <script src="./data/heap.js"></script>
  <script src="./data/lookup.js"></script>
  <script src="./data/singleton.js"></script>
  <script src="./data/caches.js"></script>

  <!-- Mecánica de cada widget interactivo (una vista por archivo) -->
  <script src="./js/page-pipeline.js"></script>
  <script src="./js/page-yarv.js"></script>
  <script src="./js/page-jit.js"></script>
  <script src="./js/page-gvl.js"></script>
  <script src="./js/page-ractors.js"></script>
  <script src="./js/page-fibers.js"></script>
  <script src="./js/page-gc.js"></script>
  <script src="./js/page-shapes.js"></script>
  <script src="./js/page-heap.js"></script>
  <script src="./js/page-lookup.js"></script>
  <script src="./js/page-singleton.js"></script>
  <script src="./js/page-caches.js"></script>

  <!-- Enrutado por hash y arranque: al final -->
  <script src="./js/router.js"></script>
</body>
</html>
