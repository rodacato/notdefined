<!-- Tema antes del primer paint: lee localStorage("guia-tema") = light|dark|system (default dark) -->
<script>
  (function () {
    try {
      var pref = localStorage.getItem("guia-tema") || "dark";
      var dark = pref === "dark" ||
        (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.classList.toggle("dark", dark);
    } catch (e) {
      document.documentElement.classList.add("dark");
    }
  })();
</script>
