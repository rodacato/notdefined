<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APIs 1001 · almanaque técnico — estilos de API catalogados</title>
  <meta name="description" content="Almanaque técnico de 13 estilos de API en 5 familias: REST, gRPC, GraphQL, WebSockets, webhooks y más. Fichas comparativas, simuladores de protocolo animados y un comparador de escenarios. El 101 ya te lo sabías; este es el 1001.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38 38'%3E%3Cg fill='none' stroke='%2333231C' stroke-width='2.4' stroke-linecap='square'%3E%3Cpath d='M3 11V3h8M35 11V3h-8M3 27v8h8M35 27v8h-8'/%3E%3C/g%3E%3Ccircle cx='19' cy='19' r='3.3' fill='%23B33A28'/%3E%3C/svg%3E">
  <!-- Tema antes del primer paint: lee "guia-tema" (light/dark/system, def. dark) -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem("guia-tema") || "dark";
        var dark = pref === "dark" ||
          (pref === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) { document.documentElement.classList.add("dark"); }
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="topbar"></div>
  <main id="app" class="app-root"></main>
  <div id="footer" class="app-root"></div>

  <!-- Datos (el guión). Cargan antes que la mecánica. -->
  <script src="./data/ejes.js"></script>
  <script src="./data/catalogo.js"></script>
  <script src="./data/fichas-http.js"></script>
  <script src="./data/fichas-rpc.js"></script>
  <script src="./data/fichas-consulta.js"></script>
  <script src="./data/fichas-tiempo-real.js"></script>
  <script src="./data/fichas-eventos.js"></script>
  <script src="./data/escenarios.js"></script>
  <script src="./data/quiz.js"></script>
  <script src="./data/desambiguacion.js"></script>

  <!-- Mecánica (el motor). core primero, router al final. -->
  <script src="./js/core.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/page-catalogo.js"></script>
  <script src="./js/page-ficha.js"></script>
  <script src="./js/page-comparador.js"></script>
  <script src="./js/page-quiz.js"></script>
  <script src="./js/page-desambiguacion.js"></script>
  <script src="./js/router.js"></script>
</body>
</html>
