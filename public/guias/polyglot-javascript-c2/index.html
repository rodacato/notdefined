  <!-- Aplica el tema ANTES del primer paint para evitar parpadeo -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem("guia-tema") || "dark";
        var dark = pref === "dark" || (pref === "system" &&
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {
        document.documentElement.classList.add("dark"); // default: teatro a oscuras
      }
    })();
  </script>
