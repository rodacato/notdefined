<meta name="description" content="Almanaque visual de 21 estilos de arquitectura de software en 5 familias, en es-MX. El 101 ya te lo sabías; este es el 1001: directo a criterios y trade-offs. Cada estilo nació de una presión y cobra un precio; empieza por el problema, no por el nombre. Filtro por problema, fichas con topología y trade-offs, y una guía para elegir entre estilos que sirven para lo mismo.">

<link rel="stylesheet" href="./styles.css">
<script>
  // Aplica el tema antes del primer paint (default: dark) para evitar flash.
  (function () {
    try {
      var t = localStorage.getItem("guia-tema") || "dark";
      if (t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.classList.add("dark");
    } catch (e) { document.documentElement.classList.add("dark"); }
  })();
</script>
</head>
<body>
  <!-- Cromo del sitio -->
  <div class="site-bar">

  </div>

  <!-- La vista activa se monta aquí según la ruta (#/…) -->
  <main id="app"></main>

  <!-- Scripts clásicos (sin build, sin CDN, sin ES modules): funcionan abriendo
       index.html con doble clic. data/ define el contenido (window.GUIA,
       catálogo + fichas por familia); js/ es la mecánica. EL ORDEN IMPORTA en
       ambos: catálogo → fichas, y core → components → páginas → router. -->
  <script src="./data/catalogo.js"></script>
