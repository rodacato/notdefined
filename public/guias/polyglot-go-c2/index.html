<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230B1F26'/%3E%3Cg fill='none' stroke='%2345C0CE' stroke-width='1.8' stroke-linecap='round'%3E%3Cpath d='M5 9V5h4M19 9V5h-4M5 15v4h4M19 15v4h-4'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='1.8' fill='%2345C0CE'/%3E%3C/svg%3E">
<link rel="stylesheet" href="./styles.css">
<script>
  /* tema antes del primer paint: lee localStorage("guia-tema") (light/dark/system, default dark) */
  (function () {
    var m = "dark";
    try { var v = localStorage.getItem("guia-tema"); if (v === "light" || v === "dark" || v === "system") m = v; } catch (e) {}
    var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.classList.toggle("dark", dark);
  })();
</script>
</head>
<body>
<div id="app"></div>

<!-- vanilla, sin build, sin ES modules; orden explícito -->

</html>
