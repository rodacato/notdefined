<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <meta name="color-scheme" content="light dark" />
  <title>Algoritmos 1001 · almanaque técnico</title>
  <meta name="description" content="El 101 ya te lo sabías; este es el 1001. Curso interactivo de algoritmos en español: Big O, búsquedas, ordenamiento, recursión, estructuras de datos, grafos, greedy y programación dinámica. Se aprende moviendo: predecir, animar y comparar." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38 38' fill='none' stroke='%23242B25' stroke-width='2.4' stroke-linecap='square'%3E%3Cpath d='M4 12V4h8M34 12V4h-8M4 26v8h8M34 26v8h-8'/%3E%3Ccircle cx='19' cy='19' r='3.6' fill='%2335705A' stroke='none'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
  <script>
    // Aplica el tema antes del primer paint (default: dark) para evitar flash.
    (function () {
      try {
        var t = localStorage.getItem("guia-tema") || "dark";
        if (t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches))
          document.documentElement.classList.add("dark");
      } catch (e) { document.documentElement.classList.add("dark"); }
    })();
  </script>
</head>
<body>
  <!-- Contenedor único de la SPA; el router pinta cada vista aquí. -->
  <div id="app"></div>

  <!-- Scripts clásicos (sin build, sin CDN, sin ES modules): funciona abriendo
       index.html con doble clic. data/ define el contenido (window.GUIA.DATA,
       armado por familia); js/ es la mecánica. EL ORDEN IMPORTA en ambos:
       catálogo → sims por familia → guía, y core → components → páginas → router. -->
  <script src="./data/catalogo.js"></script>
  <script src="./data/sims-busqueda.js"></script>
  <script src="./data/sims-fundamentos.js"></script>
  <script src="./data/sims-ordenamiento.js"></script>
  <script src="./data/sims-recursion.js"></script>
  <script src="./data/sims-estructuras.js"></script>
  <script src="./data/sims-grafos.js"></script>
  <script src="./data/sims-greedy-dp.js"></script>
  <script src="./data/guia.js"></script>
  <script src="./js/core.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/page-index.js"></script>
  <script src="./js/page-guia.js"></script>
  <script src="./js/page-fundamentos.js"></script>
  <script src="./js/page-busqueda.js"></script>
  <script src="./js/page-ordenamiento.js"></script>
  <script src="./js/page-recursion.js"></script>
  <script src="./js/page-estructuras.js"></script>
  <script src="./js/page-grafos.js"></script>
  <script src="./js/page-greedy-dp.js"></script>
  <script src="./js/router.js"></script>
</body>
</html>
