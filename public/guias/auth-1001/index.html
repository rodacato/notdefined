<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auth 1001 · almanaque técnico</title>
  <meta name="description" content="El 101 ya te lo sabías; este es el 1001: un almanaque técnico de métodos de autenticación y autorización para recuperar por el problema que resuelves, no por su nombre.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38 38' fill='none' stroke='%236B4FA3' stroke-width='2' stroke-linecap='square'><path d='M3 11V3h8M35 11V3h-8M3 27v8h8M35 27v8h-8'/><circle cx='19' cy='19' r='3.3' fill='%236B4FA3' stroke='none'/></svg>">
  <!-- Tema antes del primer paint (evita flash). Lee la preferencia de la serie;
       default "dark" (pasaporte). Valores: light | dark | system. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("guia-tema") || "dark";
        var oscuro = t === "dark" || (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", oscuro);
      } catch (e) { document.documentElement.classList.add("dark"); }
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app"></div>
  <noscript style="display:block;max-width:640px;margin:80px auto;padding:0 24px;font-family:Georgia,serif;">
    Este almanaque necesita JavaScript para las simulaciones interactivas. Actívalo para consultarlo.
  </noscript>

  <!-- Scripts clásicos (sin build, sin CDN, sin ES modules): funcionan abriendo
       index.html con doble clic. data/ define el contenido (window.GUIA,
       catálogo + fichas por familia + simulaciones); js/ es la mecánica.
       EL ORDEN IMPORTA en ambos: catálogo → fichas → simulaciones → quiz,
       y core → components → páginas → router. -->
  <!-- 1) Datos (el guión) -->
  <script src="./data/catalogo.js"></script>
  <script src="./data/fichas-identidad.js"></script>
  <script src="./data/fichas-delegacion.js"></script>
  <script src="./data/fichas-maquina.js"></script>
  <script src="./data/fichas-autorizacion.js"></script>
  <script src="./data/simulaciones.js"></script>
  <script src="./data/escenarios.js"></script>
  <script src="./data/desambiguacion.js"></script>
  <!-- 2) Base del namespace -->
  <script src="./js/core.js"></script>
  <!-- 3) Piezas compartidas (el motor) -->
  <script src="./js/components.js"></script>
  <!-- 4) Páginas -->
  <script src="./js/page-inicio.js"></script>
  <script src="./js/page-ficha.js"></script>
  <script src="./js/page-cual-uso.js"></script>
  <script src="./js/page-desambiguacion.js"></script>
  <!-- 5) Enrutado y arranque -->
  <script src="./js/router.js"></script>
</body>
</html>
